<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Sesi Terhapus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#d7e2ff",
                        "primary-fixed-dim": "#abc7ff",
                        "primary": "#0059b5",
                        "secondary": "#5f5e60",
                        "on-surface": "#1a1b1f",
                        "on-surface-variant": "#414753",
                        "on-secondary-container": "#636264",
                        "outline-variant": "#c1c6d6",
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F5F5F7;
            background-image: radial-gradient(circle at 15% 50%, rgba(200, 215, 255, 0.4), transparent 30%), 
                              radial-gradient(circle at 85% 30%, rgba(255, 215, 215, 0.4), transparent 30%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .liquid-glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-0 relative overflow-hidden">
    <!-- Background Decorative Element -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-[#ff3b30]/10 blur-[140px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary-fixed/30 blur-[140px]"></div>
    </div>
    
    <main class="w-full max-w-[540px] z-10 flex flex-col items-center">
        <!-- Message Card -->
        <div class="liquid-glass-card rounded-[2.5rem] p-10 md:p-14 w-full flex flex-col items-center text-center">
            
            <div class="w-24 h-24 rounded-full bg-white/60 shadow-[0_10px_30px_rgba(255,59,48,0.2)] border border-white flex items-center justify-center mb-8 text-[#ff3b30]">
                <span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">power_settings_new</span>
            </div>

            <div class="mb-8">
                <h1 class="text-[32px] font-bold text-on-surface mb-3 tracking-tight">{{TITLE}}</h1>
                <p class="text-[17px] text-on-secondary-container max-w-[340px] mx-auto opacity-80 leading-relaxed">
                    {{MESSAGE}}
                </p>
            </div>
            
            <a href="/" class="w-full bg-[#0071e3] hover:bg-blue-600 transition-colors text-white font-semibold py-4 rounded-full shadow-[0_4px_14px_rgba(0,113,227,0.25)] flex justify-center text-[15px]">
                Kembali ke Dashboard
            </a>
        </div>
    </main>
    <script>
        setTimeout(() => { window.location.href = "{{QR_REDIRECT_URL}}"; }, 15000);
    </script>
</body>
</html>
